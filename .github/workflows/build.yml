name: Build Private JobAgent on Public Runner

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:          # 手动触发
  # 如果还需要外部 API 触发，可以保留 repository_dispatch
  # repository_dispatch:
  #   types: [trigger-build]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      # 这些敏感信息从公共仓库的 Secrets 中读取
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      # 关键：签出私有仓库的代码
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: offerhelperai/JobAgent
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          # 不指定 path，默认签出到当前目录，这样后续命令无需 cd

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Patch electron-builder-encryptor babel config
        run: |
          sed -i 's/plugins: \["@babel\/plugin-transform-arrow-functions"\]/plugins: ["@babel\/plugin-transform-classes", "@babel\/plugin-transform-arrow-functions"]/' node_modules/electron-builder-encryptor/dist/index.js

      - name: Build Windows application
        run: npm run build:win:full

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: release/*.exe
          if-no-files-found: error

  build-mac-intel:
    # 使用官方支持的 Intel 运行器
    runs-on: macos-15
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: offerhelperai/JobAgent
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean npm cache and dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install

      - name: Build Mac Intel application
        run: npm run build:mac:x64

      - name: Upload Mac Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-intel-build
          path: release/*.dmg
          overwrite: false

  build-mac-arm:
    # 使用官方支持的 ARM 运行器（目前 macos-latest 指向 macos-14）
    runs-on: macos-14
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: offerhelperai/JobAgent
          token: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Clean npm cache and dependencies
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm cache clean --force

      - name: Install dependencies
        run: npm install
        
      - name: Build Mac ARM application
        run: npm run build:mac:arm64

      - name: Upload Mac ARM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm-build
          path: release/*.dmg
          overwrite: false

  release:
    needs: [build-windows, build-mac-intel, build-mac-arm]
    runs-on: ubuntu-latest
    # 仅在 push 到 main/master 时创建 Release（可调整）
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: Create Release and upload assets to private repo
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          repository: offerhelperai/JobAgent
          tag: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          artifacts: "./release-artifacts/**/*"
          artifactErrorsFailBuild: true
